services:

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: metarpulse-db
    environment:
      POSTGRES_DB: metarpulse
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpass123}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d metarpulse"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ─── API ─────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: src/MetarPulse.Api/Dockerfile
    container_name: metarpulse-api
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__PostgreSQL: "Host=postgres;Port=5432;Database=metarpulse;Username=app;Password=${POSTGRES_PASSWORD:-devpass123}"
      Jwt__SecretKey: "${JWT_SECRET:-CHANGE_ME_STRONG_SECRET_MIN_32_CHARACTERS_HERE!}"
      Jwt__Issuer: MetarPulse
      Jwt__Audience: MetarPulseApp
      # İsteğe bağlı: hava durumu API anahtarları
      # WeatherProviders__Providers__AVWX__ApiKey: ""
      # WeatherProviders__Providers__CheckWX__ApiKey: ""
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ─── Web (Blazor WASM → nginx) ───────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: src/MetarPulse.Web/Dockerfile
    container_name: metarpulse-web
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

  # ─── Cloudflare Tunnel ───────────────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: metarpulse-tunnel
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - api
      - web
    restart: unless-stopped

volumes:
  pgdata:
