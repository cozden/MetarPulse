<?xml version="1.0" encoding="UTF-8"?>
<svg width="456" height="456" viewBox="0 0 456 456" xmlns="http://www.w3.org/2000/svg">

  <!-- Radar rings (behind airplane) -->
  <circle cx="228" cy="248" r="148" fill="none" stroke="white" stroke-width="9" opacity="0.18"/>
  <circle cx="228" cy="248" r="104" fill="none" stroke="white" stroke-width="8" opacity="0.28"/>
  <circle cx="228" cy="248" r="60"  fill="none" stroke="white" stroke-width="7" opacity="0.40"/>

  <!-- Airplane — top-down view, pointing up, centered at (228, 230) -->
  <g fill="white">
    <!-- Fuselage -->
    <ellipse cx="228" cy="218" rx="17" ry="80"/>

    <!-- Main wings (swept) -->
    <path d="
      M 228,195
      L 228,205
      L  76,272
      L  72,265
      Z
    "/>
    <path d="
      M 228,195
      L 228,205
      L 380,272
      L 384,265
      Z
    "/>

    <!-- Wing leading-edge fill -->
    <path d="M 72,265 L 76,272 L 228,215 L 384,265 L 380,272 L 228,205 Z"/>

    <!-- Horizontal stabilizer -->
    <path d="
      M 228,282
      L 228,289
      L 157,314
      L 154,308
      Z
    "/>
    <path d="
      M 228,282
      L 228,289
      L 299,314
      L 302,308
      Z
    "/>
    <path d="M 154,308 L 157,314 L 228,291 L 299,314 L 302,308 L 228,282 Z"/>

    <!-- Nose cone -->
    <ellipse cx="228" cy="142" rx="11" ry="13"/>
  </g>

  <!-- Pulse dot at center (radar blip) -->
  <circle cx="228" cy="248" r="7" fill="white" opacity="0.7"/>

</svg>
